name: Deploy to EC2

on:
  push:
    branches: ["main"]
  workflow_dispatch: # manual trigger

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # Log in to GitHub Container Registry
      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      # Build and push Docker image
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/team-tasks-aws:latest
            ghcr.io/${{ github.repository_owner }}/team-tasks-aws:${{ github.sha }}

      # Deploy to EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_SSH_PORT }}
          timeout: 30s
          script: |
            set -euo pipefail
            IMAGE=ghcr.io/${{ github.repository_owner }}/team-tasks-aws:latest

            # ensure docker present
            docker --version || (sudo apt-get update && sudo apt-get install -y docker.io && sudo systemctl enable --now docker)

            echo "Pulling latest Docker image..."
            echo ${{ secrets.GHCR_PAT }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull $IMAGE

            echo "Stopping old container..."
            docker stop team-tasks-aws || true
            docker rm team-tasks-aws || true

            echo "Running new container..."
            docker run -d --name team-tasks-aws --restart unless-stopped \
              -p 80:3000 \
              -e SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
              -e SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
              $IMAGE

            echo "Deployed successfully!"
            docker ps -a
